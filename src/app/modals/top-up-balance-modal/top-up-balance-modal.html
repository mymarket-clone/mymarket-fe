<div *transloco="let t" class="cdk-portal fixed inset-0 z-999 bg-black/50">
  <div class="flex h-full items-center justify-center p-4">
    <div class="w-full max-w-md rounded-xl bg-white p-6">
      <div class="flex justify-end">
        <button (click)="closeModal()" type="button" class="cursor-pointer rounded-full bg-gray-10 p-2">
          <svg-icon src="assets/close-cross.svg" class="block h-6 w-6" />
        </button>
      </div>

      <h2 class="tbc-bold mt-2 text-lg">{{ t('balance.topUpTitle') }}</h2>
      <div class="mt-5">
        <label class="tbc-medium block pb-2 text-xs">{{ t('balance.amount') }}</label>
        <input
          type="number"
          min="0.01"
          step="0.01"
          [value]="amount()"
          (input)="onAmountChange($any($event.target).value)"
          class="h-11 w-full rounded-lg border border-gray-130 px-3 text-sm outline-none transition-colors focus:border-blue-100/50"
        />
        @if (error(); as errorKey) {
          <span class="tbc-regular mt-1 block text-xs text-red-500">{{ t(errorKey) }}</span>
        }
      </div>

      <div class="mt-6 flex justify-end gap-3">
        <button (click)="closeModal()" type="button" class="tbc-regular cursor-pointer px-4 text-sm text-gray-135">
          {{ t('postDetails.cancel') }}
        </button>
        <button
          (click)="submit()"
          type="button"
          [disabled]="loading()"
          class="tbc-medium cursor-pointer rounded-lg bg-yellow px-6 py-3 text-sm text-white transition-all hover:bg-yellow/80 disabled:opacity-60"
        >
          {{ t('menu.topUp') }}
        </button>
      </div>
    </div>
  </div>
</div>
