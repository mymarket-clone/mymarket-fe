<div class="cdk-portal h-full w-full fixed inset-0 z-999 bg-black/50">
  <div class="flex h-full items-center justify-center md:p-4 p-0">
    <div
      class="flex max-h-full flex-col overflow-y-auto bg-white w-full h-full rounded-none md:w-auto md:h-auto md:rounded-xl"
    >
      <div class="p-4 md:w-xl md:p-6">
        <div class="flex justify-end">
          <div (click)="closeModal()" class="p-2 bg-gray-10 rounded-full cursor-pointer">
            <svg-icon src="assets/close-cross.svg" class="h-6 w-6 block" />
          </div>
        </div>
        <div class="mt-4 flex justify-center">
          <span class="tbc-bold text-lg block">
            {{ 'postDetails.sendMessage' | transloco }}
          </span>
        </div>
        <form *transloco="let t" class="mt-4 md:px-5">
          <textarea
            class="h-55 w-full rounded-lg border border-gray-130 p-3 text-[14px] focus:border-blue-100/50 focus:outline-none default-scrollbar transition-colors"
            [placeholder]="t('postDetails.textForSeller')"
            [value]="message()"
            (input)="onMessageChange($any($event.target).value)"
            style="height: 209px"
          ></textarea>
          @if (showError()) {
            <span class="tbc-regular text-xs text-red">{{ t('postDetails.provideMessage') }}</span>
          }
          <div class="mt-8 flex flex-wrap-reverse items-center justify-end md:flex-nowrap">
            <span
              (click)="closeModal()"
              type="button"
              class="tbc-regular text-xs mt-4 w-full cursor-pointer text-center text-gray-135 md:mr-4 md:mt-0 md:w-auto"
            >
              {{ 'postDetails.cancel' | transloco }}
            </span>
            <button
              (click)="sendMessage()"
              type="button"
              class="cursor-pointer flex items-center justify-center outline-none p-3.5 rounded-lg bg-yellow hover:bg-yellow/80 transition-all w-full px-10 text-[13px] text-white md:w-auto"
            >
              {{ 'postDetails.send' | transloco }}
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
