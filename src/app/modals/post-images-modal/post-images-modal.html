@let data = post();

<div
  class="cdk-portal bg-black/25 fixed z-9999 right-3.75 top-0 left-0 bottom-0 flex items-center justify-center p-4"
>
  <div
    *transloco="let t"
    class="flex max-h-full flex-col overflow-y-auto bg-white w-full h-full rounded-none md:w-auto md:h-auto md:rounded-xl"
  >
    <div class="flex flex-col p-4 pt-0 md:overflow-hidden md:p-6 max-w-7xl h-fit lg:h-175">
      <div class="hidden max-h-fit lg:max-h-160 overflow-hidden md:flex">
        <div class="flex w-full flex-col overflow-hidden default-scrollbar!">
          <div class="flex items-center justify-end">
            <span (click)="closePortal()" class="cursor-pointer rounded-full bg-[#f2f2f6]">
              <div class="p-1">
                <svg-icon src="assets/close-cross.svg" class="h-6 w-6 block" />
              </div>
            </span>
          </div>
          <div class="overflow-y-auto default-scrollbar">
            <div class="w-full flex flex-col gap-4 lg:flex-row lg:gap-0">
              <div class="relative flex flex-wrap lg:flex-nowrap max-w-200">
                <div
                  #swiper
                  class="mr-3 w-full flex-1 flex flex-row overflow-x-auto no-scrollbar scroll-smooth"
                >
                  @for (item of data?.images; track $index) {
                    <div class="w-full h-150 shrink-0" [attr.data-slide-index]="$index">
                      <img class="h-full w-full object-contain" [src]="item" />
                    </div>
                  }
                </div>
                @if ((data?.images?.length ?? 0) > 1) {
                  <div
                    (click)="prev()"
                    class="post-detail-main-slider-arrow left-0 ml-2"
                    [class.fill-gray-40]="!canGoPrev()"
                    [class.hover:bg-gray-10!]="canGoPrev()"
                    [class.cursor-not-allowed!]="!canGoPrev()"
                  >
                    <svg-icon src="assets/left-arrow.svg" />
                  </div>
                  <div
                    (click)="next()"
                    class="post-detail-main-slider-arrow right-0 mr-2"
                    [class.hover:bg-gray-10!]="canGoNext()"
                    [class.fill-gray-40]="!canGoNext()"
                    [class.cursor-not-allowed!]="!canGoNext()"
                  >
                    <svg-icon src="assets/right-arrow.svg" />
                  </div>
                }
              </div>
              <div class="no-scrollbar mt-4 overflow-auto scroll-smooth min-h-15 mr-0!">
                <div class="mb-2 hidden flex-col lg:flex">
                  <span class="tbc-bold text-xl block">{{ data?.title }}</span>
                  <span class="tbc-regular text-xs mt-1 block text-gray-170">ID: {{ data?.id }}</span>
                </div>
                <div #swiperMini class="flex flex-row lg:max-w-100 flex-wrap gap-1">
                  @for (item of data?.images; track $index) {
                    <div
                      [attr.data-slide-index-mini]="$index"
                      (click)="goTo($index)"
                      class="border border-transparent mr-3 shrink-0 h-15 w-18.5 cursor-pointer overflow-hidden rounded-sm"
                      [class.border-yellow]="$index == slideIndex()"
                    >
                      <img class="h-full w-full object-cover" [src]="item" fallback="assets/no-image.png" />
                    </div>
                  }
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
