<div class="block relative transform h-full shrink-0 w-47.5">
  <div class="product-card group/product relative h-full w-full overflow-hidden">
    <a routerLink="/post" [queryParams]="{ postId: post().id }">
      <div>
        <div class="ease-in-out mx-0 my-auto relative h-full w-full flex z-1">
          <div #swiper class="overflow-hidden relative w-full h-full flex z-1">
            @for (image of post().images; track $index) {
              <div
                [attr.data-slide-index]="$index"
                class="h-39.5! w-47.5! rounded-2xl flex relative shrink-0"
              >
                <img
                  [src]="image"
                  width="190"
                  height="158"
                  class="block h-39.5 w-47.5 shrink-0 rounded-2xl object-cover"
                  fallback="https://nf.mymarket.ge/no-image-min.png"
                />
              </div>
            }
          </div>
          @if ((post().images?.length ?? 0) > 1) {
            <div class="absolute top-[40%] z-50 flex w-full items-center justify-between px-1">
              <div (click)="prev($event)" class="post-card-arrow">
                <svg-icon src="assets/left-arrow-white.svg" />
              </div>
              <div (click)="next($event)" class="post-card-arrow">
                <svg-icon src="assets/right-arrow-white.svg" />
              </div>
            </div>
          }
        </div>
      </div>
    </a>
    <p class="tbc-medium text-sm mt-2 line-clamp-2 shrink-0">
      {{ post().title }}
    </p>
    <div class="mt-2 flex h-full items-end">
      <div class="flex items-center">
        <span class="tbc-bold text-base mr-1.5">{{ post().price }}</span>
      </div>
    </div>
  </div>
</div>
