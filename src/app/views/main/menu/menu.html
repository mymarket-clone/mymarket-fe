<div class="bg-gray-30">
  <div class="container px-4">
    <div class="flex gap-4 lg:gap-5">
      <app-menu-aside [menuList]="menuList()!" class="hidden xl:block" />
      <div class="flex flex-col flex-1 mt-3">
        <app-menu-title [menuItem]="currentMenuItem()!" />
        <router-outlet />
      </div>
      <app-menu-right class="hidden xl:block mt-23 h-fit sticky top-4" />
    </div>
  </div>
  <div (click)="scrollToTop()" class="flex items-center justify-center bg-yellow cursor-pointer h-11">
    <svg-icon src="assets/scr-top.svg" />
  </div>
</div>
